<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackker · Demo Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    .demo-tabs {
      display: flex; gap: 8px;
      padding: 12px 20px;
      background: rgba(0,0,0,0.30);
      border-bottom: 1px solid var(--line-1);
      overflow-x: auto;
    }
    .demo-tabs button {
      font-family: inherit; font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line-2);
      color: var(--txt-2);
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
      transition: all 140ms;
    }
    .demo-tabs button .lucide { width: 13px; height: 13px; }
    .demo-tabs button.active {
      background: rgba(88,168,255,0.15);
      border-color: var(--accent);
      color: #fff;
    }
    .demo-banner {
      background: rgba(192, 132, 252, 0.06);
      border-bottom: 1px solid rgba(192, 132, 252, 0.18);
      padding: 8px 20px;
      font-size: 12px; color: var(--magenta);
      display: flex; align-items: center; gap: 8px;
    }
    .demo-banner .lucide { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="demo-banner">
    <i data-lucide="info"></i> Live demo running on in-memory mock data — no Supabase required. Edits persist for this session only.
  </div>
  <div class="demo-tabs">
    <button data-page="public" class="active"><i data-lucide="git-branch"></i> Public node graph</button>
    <button data-page="admin"><i data-lucide="settings"></i> Admin</button>
    <button data-page="update"><i data-lucide="zap"></i> Quick update</button>
  </div>
  <div id="root"></div>

  <!-- Mock API: stub that mimics the real backend in-memory -->
  <script>
    (function () {
      const STORAGE_KEY = 'trackker.demo.v1';
      const PW = 'demo';
      const SEED = [
        { id: 'a', title: 'Discovery & specs',  description: 'Stakeholder interviews, requirements doc.', developer: 'Sarah Chen',  deadline: '2026-05-08', status: 'completed', progress: 100, pos_x: 80,  pos_y: 220, connections: ['b', 'c'], updated_at: new Date().toISOString() },
        { id: 'b', title: 'UI design',          description: 'Wireframes, hi-fi mocks, design tokens.',   developer: 'Mei Tanaka',  deadline: '2026-05-20', status: 'completed', progress: 100, pos_x: 420, pos_y: 60,  connections: ['d'], updated_at: new Date().toISOString() },
        { id: 'c', title: 'Backend API',        description: 'REST endpoints, auth, database schema.',    developer: 'James Patel', deadline: '2026-06-05', status: 'progress',  progress: 65,  pos_x: 420, pos_y: 380, connections: ['d'], updated_at: new Date().toISOString() },
        { id: 'd', title: 'Frontend build',     description: 'React app wired to API.',                   developer: 'Diego Rojas', deadline: '2026-06-20', status: 'progress',  progress: 30,  pos_x: 760, pos_y: 220, connections: ['e'], updated_at: new Date().toISOString() },
        { id: 'e', title: 'QA & launch',        description: 'Bug bash, deploy, monitor.',                developer: 'Unassigned',  deadline: '2026-07-01', status: 'notstarted', progress: 0,  pos_x: 1100, pos_y: 220, connections: [], updated_at: new Date().toISOString() },
      ];

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return JSON.parse(JSON.stringify(SEED));
          const arr = JSON.parse(raw);
          return Array.isArray(arr) && arr.length ? arr : JSON.parse(JSON.stringify(SEED));
        } catch (e) { return JSON.parse(JSON.stringify(SEED)); }
      }
      function save(list) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (e) {} }
      function delay(v, ms = 80) { return new Promise(res => setTimeout(() => res(v), ms)); }

      const state = { list: load() };

      window.api = {
        getPw: () => sessionStorage.getItem('trackker.demo.pw') || '',
        setPw: (pw) => sessionStorage.setItem('trackker.demo.pw', pw),
        clearPw: () => sessionStorage.removeItem('trackker.demo.pw'),
        async checkPassword(pw) { return delay(pw === PW || pw.length > 0); }, // accept anything in demo
        async listNodes() { return delay(JSON.parse(JSON.stringify(state.list))); },
        async createNode(body) {
          const n = {
            id: 'n_' + Math.random().toString(36).slice(2, 8),
            title: body.title || 'New node',
            description: body.description || '',
            developer: body.developer || 'Unassigned',
            deadline: body.deadline || null,
            status: body.status || 'notstarted',
            progress: Math.max(0, Math.min(100, body.progress | 0)),
            pos_x: body.pos_x ?? 200,
            pos_y: body.pos_y ?? 200,
            connections: Array.isArray(body.connections) ? body.connections : [],
            updated_at: new Date().toISOString(),
          };
          state.list = [...state.list, n]; save(state.list); return delay(n);
        },
        async updateNode(id, patch) {
          state.list = state.list.map(n => {
            if (n.id !== id) return n;
            const next = { ...n, ...patch, updated_at: new Date().toISOString() };
            if ('progress' in patch) {
              next.progress = Math.max(0, Math.min(100, patch.progress | 0));
              if (next.progress === 100) next.status = 'completed';
              else if (next.progress > 0 && n.status === 'notstarted') next.status = 'progress';
            }
            return next;
          });
          save(state.list);
          return delay(state.list.find(n => n.id === id));
        },
        async deleteNode(id) {
          state.list = state.list.filter(n => n.id !== id);
          // also remove dangling connections
          state.list = state.list.map(n => ({ ...n, connections: (n.connections || []).filter(c => c !== id) }));
          save(state.list); return delay({ ok: true });
        },
      };

      window.helpers = {
        fmtDate(iso) {
          if (!iso) return '—';
          const d = new Date(iso + 'T00:00:00');
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },
        daysUntil(iso) {
          if (!iso) return Infinity;
          const d = new Date(iso + 'T00:00:00');
          return Math.round((d - new Date(new Date().toDateString())) / 86400000);
        },
        deadlineDisplay(node) {
          if (!node.deadline) return { text: '—', tone: 'muted' };
          const days = this.daysUntil(node.deadline);
          if (node.status === 'completed') return { text: this.fmtDate(node.deadline), tone: 'ok' };
          if (days < 0) return { text: `${Math.abs(days)}d overdue`, tone: 'danger' };
          if (days === 0) return { text: 'Due today', tone: 'warn' };
          if (days <= 7) return { text: `In ${days} days`, tone: 'warn' };
          return { text: this.fmtDate(node.deadline), tone: 'muted' };
        },
        effectiveStatus(node) {
          if (node.status !== 'completed' && node.deadline && this.daysUntil(node.deadline) < 0) return 'overdue';
          return node.status;
        },
        statusLabel(s) {
          return ({ completed: 'Completed', progress: 'In progress', notstarted: 'Not started', overdue: 'Overdue' })[s] || s;
        },
        initials(name) {
          return (name || '?').split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
        },
        avatarBg(name) {
          const hues = [
            'linear-gradient(135deg, #58a8ff, #2575bd)',
            'linear-gradient(135deg, #34d399, #047857)',
            'linear-gradient(135deg, #c084fc, #7c3aed)',
            'linear-gradient(135deg, #fbbf24, #d97706)',
            'linear-gradient(135deg, #f87171, #b91c1c)',
            'linear-gradient(135deg, #6b7a99, #353d4b)',
          ];
          return hues[(name || 'U').charCodeAt(0) % hues.length];
        },
      };
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const h = window.helpers;

    /* ===== shared mini components ===== */
    const Avatar = ({ name, size = 'sm' }) => (
      <div className={`avatar ${size}`} style={{ background: h.avatarBg(name) }} title={name}>
        {h.initials(name)}
      </div>
    );

    /* ===== PUBLIC PAGE ===== */
    const NODE_W = 260, NODE_H = 168;
    function edgePath(a, b) {
      const x1 = a.pos_x + NODE_W;
      const y1 = a.pos_y + NODE_H / 2;
      const x2 = b.pos_x;
      const y2 = b.pos_y + NODE_H / 2;
      const dx = Math.max(40, Math.abs(x2 - x1) * 0.5);
      return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
    }

    const PublicNodeCard = ({ node, status }) => {
      const dl = h.deadlineDisplay(node);
      return (
        <div className={`node ${status}`} style={{ left: node.pos_x, top: node.pos_y }}>
          <div className="node-head">
            <div className="node-row">
              <span className={`k-badge ${status}`}>
                <span className="dot"></span>{h.statusLabel(status)}
              </span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--txt-3)' }}>{node.progress}%</span>
            </div>
            <div className="node-title">{node.title}</div>
            {node.description && <div className="node-desc">{node.description}</div>}
          </div>
          <div className="node-body">
            <div className="node-meta">
              <div className="meta-row">
                <i data-lucide="user"></i>
                <span className="lbl">Dev</span>
                <Avatar name={node.developer} />
                <span className="val" style={{ minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis' }}>{node.developer || 'Unassigned'}</span>
              </div>
              <div className="meta-row">
                <i data-lucide="calendar"></i>
                <span className="lbl">Due</span>
                <span className={`val ${dl.tone}`}>{dl.text}</span>
              </div>
            </div>
            <div className="node-progress">
              <div className="np-row"><span className="l">Progress</span><span className="v">{node.progress}%</span></div>
              <div className="np-bar"><span style={{ width: `${node.progress}%` }} /></div>
            </div>
          </div>
        </div>
      );
    };

    const PublicGraph = ({ nodes }) => {
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nodes]);
      const byId = useMemo(() => { const m = {}; nodes.forEach(n => m[n.id] = n); return m; }, [nodes]);
      const edges = [];
      nodes.forEach(src => (src.connections || []).forEach(tgtId => {
        const tgt = byId[tgtId];
        if (tgt) edges.push({ src, tgt, status: h.effectiveStatus(src) });
      }));
      return (
        <div className="graph-canvas">
          <div className="graph-inner">
            <svg className="graph-edges" width="1800" height="1200">
              <defs>
                <marker id="arrow-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="rgba(52,211,153,0.7)" /></marker>
                <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="rgba(251,191,36,0.7)" /></marker>
                <marker id="arrow-idle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="rgba(107,122,153,0.6)" /></marker>
              </defs>
              {edges.map((e, i) => {
                const cls = e.status === 'completed' ? 'completed' : (e.status === 'progress' || e.status === 'overdue') ? 'progress' : 'notstarted';
                const marker = cls === 'completed' ? 'arrow-ok' : cls === 'progress' ? 'arrow-warn' : 'arrow-idle';
                return <path key={i} className={`edge-path ${cls}`} d={edgePath(e.src, e.tgt)} markerEnd={`url(#${marker})`} />;
              })}
            </svg>
            {nodes.map(n => <PublicNodeCard key={n.id} node={n} status={h.effectiveStatus(n)} />)}
          </div>
          <div className="legend">
            <div className="lg-row"><span className="sw" style={{ background: 'var(--ok)' }}></span> Completed</div>
            <div className="lg-row"><span className="sw" style={{ background: 'var(--warn)' }}></span> In progress</div>
            <div className="lg-row"><span className="sw" style={{ background: 'var(--idle)' }}></span> Not started</div>
            <div className="lg-row"><span className="sw" style={{ background: 'var(--danger)' }}></span> Overdue</div>
          </div>
        </div>
      );
    };

    const KPIs = ({ nodes }) => {
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nodes]);
      const completed = nodes.filter(n => n.status === 'completed').length;
      const inProgress = nodes.filter(n => n.status === 'progress').length;
      const notStarted = nodes.filter(n => n.status === 'notstarted').length;
      const overdue = nodes.filter(n => n.status !== 'completed' && n.deadline && h.daysUntil(n.deadline) < 0).length;
      const overall = nodes.length === 0 ? 0 : Math.round(nodes.reduce((s, n) => s + n.progress, 0) / nodes.length);
      return (
        <div className="kpi-grid">
          <div className="kpi">
            <div className="k-label"><i data-lucide="trending-up"></i> Overall progress</div>
            <div className="k-num">{overall}%</div>
            <div className="k-sub"><strong>{nodes.length}</strong> nodes total</div>
            <div className="micro-bar"><span style={{ width: `${overall}%`, background: 'linear-gradient(90deg, rgba(88,168,255,0.4), var(--accent))', boxShadow: '0 0 10px var(--accent-glow)' }} /></div>
          </div>
          <div className="kpi completed-kpi">
            <div className="k-label"><i data-lucide="check-circle-2"></i> Completed</div>
            <div className="k-num">{completed}</div>
            <div className="k-sub">delivered</div>
            <div className="micro-bar"><span style={{ width: `${nodes.length ? (completed/nodes.length)*100 : 0}%`, background: 'linear-gradient(90deg, rgba(52,211,153,0.4), var(--ok))', boxShadow: '0 0 10px var(--ok-glow)' }} /></div>
          </div>
          <div className="kpi progress-kpi">
            <div className="k-label"><i data-lucide="loader"></i> In progress</div>
            <div className="k-num">{inProgress}</div>
            <div className="k-sub">{notStarted} not started</div>
            <div className="micro-bar"><span style={{ width: `${nodes.length ? (inProgress/nodes.length)*100 : 0}%`, background: 'linear-gradient(90deg, rgba(251,191,36,0.4), var(--warn))', boxShadow: '0 0 10px var(--warn-glow)' }} /></div>
          </div>
          <div className="kpi">
            <div className="k-label" style={{ color: overdue > 0 ? 'var(--danger)' : undefined }}><i data-lucide="alert-triangle"></i> Overdue</div>
            <div className="k-num" style={{ color: overdue > 0 ? 'var(--danger)' : '#fff' }}>{overdue}</div>
            <div className="k-sub">{overdue === 0 ? 'all on track' : 'need attention'}</div>
            <div className="micro-bar"><span style={{ width: `${nodes.length ? (overdue/nodes.length)*100 : 0}%`, background: overdue > 0 ? 'linear-gradient(90deg, rgba(248,113,113,0.4), var(--danger))' : 'rgba(255,255,255,0.08)' }} /></div>
          </div>
        </div>
      );
    };

    const PublicPage = ({ nodes }) => {
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nodes]);
      return (
        <>
          <header className="topbar">
            <div className="brand">
              <div className="logo">T</div>
              <div><div className="name">Trackker</div><div className="sub">Project status</div></div>
            </div>
            <div className="spacer" />
            <div className="view-pill client"><i data-lucide="eye"></i> Live · read only</div>
          </header>
          <main className="main" data-screen-label="Public · Node Graph">
            <div className="page-header">
              <div>
                <div className="page-eyebrow">Live status</div>
                <h1 className="page-title">Project node graph</h1>
                <p className="page-sub">Each node is a milestone. Lines show dependencies. Refreshes automatically as the team makes progress.</p>
              </div>
            </div>
            <KPIs nodes={nodes} />
            <div className="graph-wrap">
              <PublicGraph nodes={nodes} />
            </div>
          </main>
        </>
      );
    };

    /* ===== ADMIN PAGE ===== */
    const FilterBar = ({ filter, setFilter, counts }) => {
      const chips = [
        { id: 'all', label: 'All' },
        { id: 'progress', label: 'In progress' },
        { id: 'completed', label: 'Completed' },
        { id: 'notstarted', label: 'Not started' },
      ];
      return (
        <div className="filter-bar">
          <div className="filter-group">
            {chips.map(c => (
              <button key={c.id} className={`filter-chip ${filter === c.id ? 'active' : ''}`} onClick={() => setFilter(c.id)}>
                {c.label}<span className="count">{counts[c.id]}</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    const NodeRow = ({ node, allNodes, onUpdate, onDelete }) => {
      const [editing, setEditing] = useState(false);
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [node, editing]);
      const status = h.effectiveStatus(node);
      const dl = h.deadlineDisplay(node);
      const setStatus = (st) => {
        const patch = { status: st };
        if (st === 'completed') patch.progress = 100;
        if (st === 'notstarted') patch.progress = 0;
        onUpdate(node.id, patch);
      };
      const toggleConn = (id) => {
        const set = new Set(node.connections || []);
        if (set.has(id)) set.delete(id); else set.add(id);
        onUpdate(node.id, { connections: [...set] });
      };
      return (
        <div className={`node-row-card ${status}`}>
          <div className="nrc-top">
            <div className="nrc-name">
              <div className="row1"><span className={`k-badge ${status}`}><span className="dot"></span>{h.statusLabel(status)}</span></div>
              <div className="title">{node.title}</div>
              {node.description && <div className="desc">{node.description}</div>}
            </div>
            <div className="nrc-cell">
              <div className="lbl"><i data-lucide="user"></i> Developer</div>
              <div className="dev-row"><Avatar name={node.developer} /><span className="val">{node.developer || 'Unassigned'}</span></div>
            </div>
            <div className="nrc-cell">
              <div className="lbl"><i data-lucide="calendar"></i> Deadline</div>
              <div className={`val ${dl.tone}`}>{dl.text}</div>
            </div>
            <div className="nrc-progress">
              <div className="row"><span className="l">Progress</span><span className="v">{node.progress}%</span></div>
              <div className="bar"><span style={{ width: `${node.progress}%` }} /></div>
            </div>
            <div className="nrc-actions">
              {!editing ? (
                <button className="btn btn-secondary btn-sm" onClick={() => setEditing(true)}><i data-lucide="pencil"></i> Edit</button>
              ) : (
                <button className="btn btn-primary btn-sm" onClick={() => setEditing(false)}><i data-lucide="check"></i> Done</button>
              )}
            </div>
          </div>
          {editing && (
            <div className="edit-panel">
              <div className="field"><label>Title</label><input className="inp" value={node.title} onChange={e => onUpdate(node.id, { title: e.target.value })} /></div>
              <div className="field">
                <label>Status</label>
                <select className="inp" value={node.status} onChange={e => setStatus(e.target.value)}>
                  <option value="notstarted">Not started</option>
                  <option value="progress">In progress</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
              <div className="field"><label>Developer</label><input className="inp" value={node.developer || ''} onChange={e => onUpdate(node.id, { developer: e.target.value })} /></div>
              <div className="field"><label>Deadline</label><input className="inp" type="date" value={node.deadline || ''} onChange={e => onUpdate(node.id, { deadline: e.target.value || null })} /></div>
              <div className="field full"><label>Description</label><textarea className="inp" value={node.description || ''} onChange={e => onUpdate(node.id, { description: e.target.value })} /></div>
              <div className="field full">
                <label>Progress · {node.progress}%</label>
                <div className="slider-row">
                  <input className="slider-inp" type="range" min="0" max="100" step="5" value={node.progress}
                    style={{ '--p': `${node.progress}%` }}
                    onChange={e => onUpdate(node.id, { progress: parseInt(e.target.value, 10) })} />
                  <span className="pct-tag">{node.progress}%</span>
                </div>
              </div>
              <div className="field" style={{ gridColumn: '1 / 3' }}>
                <label>Position on graph</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input className="inp" type="number" value={node.pos_x} onChange={e => onUpdate(node.id, { pos_x: parseInt(e.target.value, 10) || 0 })} placeholder="X" />
                  <input className="inp" type="number" value={node.pos_y} onChange={e => onUpdate(node.id, { pos_y: parseInt(e.target.value, 10) || 0 })} placeholder="Y" />
                </div>
              </div>
              <div className="field" style={{ gridColumn: '3 / -1' }}>
                <label>Connects to (downstream)</label>
                <div className="conn-list">
                  {allNodes.filter(n => n.id !== node.id).map(other => (
                    <label key={other.id}>
                      <input type="checkbox" checked={(node.connections || []).includes(other.id)} onChange={() => toggleConn(other.id)} /> {other.title}
                    </label>
                  ))}
                </div>
              </div>
              <div className="actions">
                <button className="btn btn-danger btn-sm" onClick={() => { if (confirm('Delete this node?')) onDelete(node.id); }}>
                  <i data-lucide="trash-2"></i> Delete node
                </button>
                <span className="meta-time">Updated {new Date(node.updated_at).toLocaleString()}</span>
              </div>
            </div>
          )}
        </div>
      );
    };

    const AdminPage = ({ nodes, onUpdate, onDelete, onAdd }) => {
      const [filter, setFilter] = useState('all');
      const [title, setTitle] = useState('');
      const [developer, setDeveloper] = useState('');
      const [deadline, setDeadline] = useState('');
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nodes, filter]);
      const counts = {
        all: nodes.length,
        completed: nodes.filter(n => n.status === 'completed').length,
        progress: nodes.filter(n => n.status === 'progress').length,
        notstarted: nodes.filter(n => n.status === 'notstarted').length,
      };
      const visible = filter === 'all' ? nodes : nodes.filter(n => n.status === filter);
      return (
        <>
          <header className="topbar">
            <div className="brand">
              <div className="logo">T</div>
              <div><div className="name">Trackker</div><div className="sub">Admin</div></div>
            </div>
            <div className="spacer" />
            <div className="view-pill"><i data-lucide="shield-check"></i> Admin · editing</div>
          </header>
          <main className="main" data-screen-label="Admin · Manage nodes">
            <div className="page-header">
              <div>
                <div className="page-eyebrow">Admin dashboard</div>
                <h1 className="page-title">Manage project nodes</h1>
                <p className="page-sub">Add, edit, and connect nodes. Changes save automatically and appear on the public graph.</p>
              </div>
            </div>
            <FilterBar filter={filter} setFilter={setFilter} counts={counts} />
            <form onSubmit={e => { e.preventDefault(); if (!title.trim()) return; onAdd({ title: title.trim(), developer: developer.trim() || 'Unassigned', deadline: deadline || null }); setTitle(''); setDeveloper(''); setDeadline(''); }} style={{ display: 'grid', gridTemplateColumns: '2fr 1.2fr 1fr auto', gap: 10, padding: '14px 16px', marginBottom: 14, background: 'rgba(88, 168, 255, 0.04)', border: '1px dashed rgba(88, 168, 255, 0.28)', borderRadius: 10 }}>
              <div className="field"><label style={{ color: 'var(--accent)' }}>New node title</label><input className="inp" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Backend API" /></div>
              <div className="field"><label style={{ color: 'var(--accent)' }}>Developer</label><input className="inp" value={developer} onChange={e => setDeveloper(e.target.value)} placeholder="Sarah Chen" /></div>
              <div className="field"><label style={{ color: 'var(--accent)' }}>Deadline</label><input className="inp" type="date" value={deadline} onChange={e => setDeadline(e.target.value)} /></div>
              <div className="field" style={{ alignSelf: 'end' }}><button className="btn btn-primary" type="submit" disabled={!title.trim()}><i data-lucide="plus"></i> Add node</button></div>
            </form>
            {visible.length === 0 ? (
              <div className="card empty"><i data-lucide="search-x"></i><div>No nodes match this filter.</div></div>
            ) : (
              <div className="node-list">
                {visible.map(n => <NodeRow key={n.id} node={n} allNodes={nodes} onUpdate={onUpdate} onDelete={onDelete} />)}
              </div>
            )}
          </main>
        </>
      );
    };

    /* ===== UPDATE PAGE ===== */
    const UpdatePage = ({ nodes, onUpdate }) => {
      const [selectedId, setSelectedId] = useState(nodes.find(n => n.status !== 'completed')?.id || nodes[0]?.id || '');
      const selected = nodes.find(n => n.id === selectedId);
      const [pct, setPct] = useState(selected ? selected.progress : 0);
      useEffect(() => { if (selected) setPct(selected.progress); }, [selectedId]);
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nodes, selectedId, pct]);
      if (!selected) return <div className="empty">No nodes available.</div>;
      const dl = h.deadlineDisplay(selected);
      const status = h.effectiveStatus(selected);
      const changed = pct !== selected.progress;
      const submit = () => {
        const patch = { progress: pct };
        if (pct === 100) patch.status = 'completed';
        else if (pct > 0 && selected.status === 'notstarted') patch.status = 'progress';
        onUpdate(selected.id, patch);
      };
      return (
        <>
          <header className="topbar">
            <div className="brand">
              <div className="logo">T</div>
              <div><div className="name">Trackker</div><div className="sub">Quick update</div></div>
            </div>
            <div className="spacer" />
            <div className="view-pill"><i data-lucide="zap"></i> Quick post</div>
          </header>
          <div className="update-wrap">
            <div className="page-header" style={{ marginBottom: 22 }}>
              <div>
                <div className="page-eyebrow">Developer · quick post</div>
                <h1 className="page-title">Update progress</h1>
                <p className="page-sub">Pick a node, type a number 0–100, hit save. The public graph updates instantly.</p>
              </div>
            </div>
            <div className="update-card" data-screen-label="Update · Quick post">
              <div className="upd-pick">
                <label style={{ fontSize: 10, color: 'var(--txt-3)', textTransform: 'uppercase', letterSpacing: '0.10em', fontWeight: 600 }}>Pick a node</label>
                <select className="inp" value={selectedId} onChange={e => setSelectedId(e.target.value)}>
                  {nodes.map(n => <option key={n.id} value={n.id}>{n.title} — {n.developer || 'Unassigned'} · {n.progress}%</option>)}
                </select>
              </div>
              <div className="upd-current">
                <div className="head">
                  <div className="title">{selected.title}</div>
                  <span className={`k-badge ${status}`}><span className="dot"></span>{h.statusLabel(status)}</span>
                </div>
                {selected.description && <div style={{ fontSize: 13, color: 'var(--txt-2)', lineHeight: 1.5 }}>{selected.description}</div>}
                <div className="meta">
                  <div><div className="lbl">Developer</div><div className="val">{selected.developer || 'Unassigned'}</div></div>
                  <div><div className="lbl">Deadline</div><div className="val" style={{ color: dl.tone === 'danger' ? 'var(--danger)' : dl.tone === 'warn' ? 'var(--warn)' : 'var(--txt-1)' }}>{dl.text}</div></div>
                  <div><div className="lbl">Current progress</div><div className="val" style={{ fontFamily: 'var(--font-mono)' }}>{selected.progress}%</div></div>
                  <div><div className="lbl">Last updated</div><div className="val">{new Date(selected.updated_at).toLocaleString()}</div></div>
                </div>
              </div>
              <div className="big-input">
                <input type="number" min="0" max="100" step="1" value={pct} onChange={e => { let v = parseInt(e.target.value, 10); if (Number.isNaN(v)) v = 0; setPct(Math.max(0, Math.min(100, v))); }} />
                <span className="pct">%</span>
                <div className="meta">
                  <span className="l">New progress</span>
                  <span className="v">{changed ? <span style={{ color: 'var(--accent)' }}>{selected.progress}% → {pct}%</span> : 'No change yet'}</span>
                </div>
              </div>
              <div className="upd-bar"><span style={{ width: `${pct}%` }} /></div>
              <div className="quick-pcts">
                {[0, 25, 50, 75, 90, 100].map(v => (
                  <button key={v} className={`pchip ${pct === v ? 'active' : ''}`} onClick={() => setPct(v)}>{v}%</button>
                ))}
              </div>
              <div className="upd-actions">
                <button className="btn btn-secondary" onClick={() => setPct(selected.progress)} disabled={!changed}>Reset</button>
                <button className="btn btn-primary" onClick={submit} disabled={!changed}><i data-lucide="check"></i> Save update</button>
              </div>
            </div>
          </div>
        </>
      );
    };

    /* ===== Demo shell ===== */
    const Demo = () => {
      const [page, setPage] = useState('public');
      const [nodes, setNodes] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      useEffect(() => {
        window.api.listNodes().then(setNodes);
      }, []);
      useEffect(() => { window.lucide && window.lucide.createIcons(); }, [page, nodes, toastMsg]);

      // wire the static demo tabs at top
      useEffect(() => {
        const buttons = document.querySelectorAll('.demo-tabs button');
        const handlers = [];
        buttons.forEach(b => {
          const handler = () => {
            buttons.forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            setPage(b.dataset.page);
          };
          b.addEventListener('click', handler);
          handlers.push([b, handler]);
        });
        return () => handlers.forEach(([b, h]) => b.removeEventListener('click', h));
      }, []);

      const flashToast = (msg, kind = 'ok') => {
        setToastMsg({ msg, kind });
        setTimeout(() => setToastMsg(null), 1600);
      };

      const onUpdate = async (id, patch) => {
        setNodes(prev => prev.map(n => n.id === id ? { ...n, ...patch } : n));
        const updated = await window.api.updateNode(id, patch);
        setNodes(prev => prev.map(n => n.id === updated.id ? updated : n));
      };
      const onDelete = async (id) => {
        await window.api.deleteNode(id);
        setNodes(prev => prev.filter(n => n.id !== id).map(n => ({ ...n, connections: (n.connections || []).filter(c => c !== id) })));
        flashToast('Node deleted');
      };
      const onAdd = async (payload) => {
        const maxX = nodes.reduce((m, n) => Math.max(m, n.pos_x), 0);
        const created = await window.api.createNode({ ...payload, pos_x: maxX + 320, pos_y: 220 });
        setNodes(prev => [...prev, created]);
        flashToast('Node added');
      };

      return (
        <>
          {page === 'public' && <PublicPage nodes={nodes} />}
          {page === 'admin'  && <AdminPage  nodes={nodes} onUpdate={onUpdate} onDelete={onDelete} onAdd={onAdd} />}
          {page === 'update' && <UpdatePage nodes={nodes} onUpdate={onUpdate} />}
          {toastMsg && (
            <div className={`toast ${toastMsg.kind === 'error' ? 'error' : ''}`}>
              <i data-lucide={toastMsg.kind === 'error' ? 'alert-triangle' : 'check-circle-2'}></i>
              {toastMsg.msg}
            </div>
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
