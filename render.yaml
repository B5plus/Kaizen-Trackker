services:
  - type: web
    name: kaizen-trackker
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false          # Set this in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false          # Set this in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set this in Render dashboard
